	<body>
		<div class="box">
			<h2>
				防山火2.0
			</h2>
			<p>
				<strong>应用场景：</strong>
				强风区域、山区及偏远等常规人员巡检方式难以保障区域。<br>			
				<strong>应用需求：</strong>
				在以上应用场景实现电力线路远程高风预警、在线检测、相关责任人员通过应用PC管理平台及微信公众号等方式实时查看现场情况，指导巡线检修调度，留存事故发生现场环境数据及图片、视频文件。
				<br>	
				<img src="img/22-1.png" alt="">
				<br>	<strong>解决方案：</strong>
				在远程点位安装监测设备，将实时监测数据上传至监控平台服务器，监控管理平台按照预定告警触发机制研判数据，触发告警则通过微信公众号推送告警信息，相关人员接收到告警信息后可以实时远程查看现场数据、图片及视频监控。后台系统可实现多维数据统计功能为制定防山火专项预案提供数据参考。
				防山火数据气象监测预警系统
			</p>
		</div>
